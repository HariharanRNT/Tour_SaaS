services:
  # 1. FastAPI Web Service
  - type: web
    name: tour-saas-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - fromGroup: tour-saas-env

  # 2. Celery Worker (Background Worker)
  - type: worker
    name: tour-saas-worker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A app.celery_app worker --loglevel=info
    envVars:
      - fromGroup: tour-saas-env
      - key: REDIS_URL
        sync: false

  # 3. Celery Beat (Background Worker for Scheduled Tasks)
  - type: worker
    name: tour-saas-beat
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A app.celery_app beat --loglevel=info
    envVars:
      - fromGroup: tour-saas-env
      - key: REDIS_URL
        sync: false

envVarGroups:
  - name: tour-saas-env
    envVars:
      - key: APP_NAME
        value: "Tour SaaS API"
      - key: APP_ENV
        value: "production"
      - key: DEBUG
        value: "False"
      - key: API_V1_PREFIX
        value: "/api/v1"
      # Add other shared env vars here
